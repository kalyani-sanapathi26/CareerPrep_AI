<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CareerPrep AI</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Reset Password</h1>
            <p>Create a new password and continue to your welcome page.</p>

            <form id="forgot-password-form">
                <input type="email" placeholder="Enter Registered Email" required>
                <input type="password" placeholder="Create New Password" required>
                <input type="password" placeholder="Confirm New Password" required>
                <button type="submit">Update Password</button>
            </form>

            <div class="extra-links single-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
