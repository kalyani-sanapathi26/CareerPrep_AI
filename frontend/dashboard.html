<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard - CareerPrep AI</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->

        <div class="sidebar">

            <h2>
                CareerPrep AI
            </h2>

            <ul>

                <li>Dashboard</li>
                <li>Aptitude</li>
                <li>Coding</li>
                <li>Reasoning</li>
                <li>Government Exams</li>
                <li>AI Interviews</li>
                <li>Results</li>

            </ul>

        </div>


        <!-- Main Content -->

        <div class="main-content">

            <div class="top-bar">

                <h1>
                    Welcome Back 👋
                </h1>

                <button>
                    Logout
                </button>

            </div>


            <!-- Stats -->

            <div class="stats-container">

                <div class="stat-card">

                    <h2>120</h2>

                    <p>Questions Solved</p>

                </div>


                <div class="stat-card">

                    <h2>85%</h2>

                    <p>Average Score</p>

                </div>


                <div class="stat-card">

                    <h2>15</h2>

                    <p>Mock Tests</p>

                </div>

            </div>


            <!-- Categories -->

            <div class="category-section">

                <h2>
                    Preparation Categories
                </h2>

                <div class="category-grid">

                    <div class="category-box">
                        Aptitude
                    </div>

                    <div class="category-box">
                        Coding
                    </div>

                    <div class="category-box">
                        Technical Interview
                    </div>

                    <div class="category-box">
                        HR Interview
                    </div>

                    <div class="category-box">
                        Government Exams
                    </div>

                    <div class="category-box">
                        Reasoning
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
